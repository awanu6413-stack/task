<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .t {
             color: white;
             background: linear-gradient(45deg, #ff416c, #ff4b2b);
             padding: 10px;
             border-radius: 10px;
             margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            padding: 12px 30px;
            background: #28a745;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        /* Table Styling */
        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            display: none; /* Hidden until calculation */
        }

        th, td {
            padding: 12px;
            border: 1px solid #eee;
            text-align: center;
        }

        th {
            background-color: #f8f9fa;
            color: #333;
        }

        .result-row {
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="t">
        <h2>Discount Offer</h2>
    </div>

    <input type="number" id="amount" placeholder="Enter Total Amount" required>
    <br>
    <button onclick="calculateDiscount()">Calculate Discount</button>

    <table id="resultTable">
        <thead>
            <tr>
                <th>ITEMS</th>
                <th>PRICE</th>
                <th>DISCOUNT</th>
                <th>FINAL PRICE</th>
            </tr>
        </thead>
        <tbody>
            <tr class="result-row">
                <td>1 Package</td>
                <td id="tdPrice">$0</td>
                <td id="tdDisc">0%</td>
                <td id="tdFinal">$0</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
function calculateDiscount() {
    let amount = document.getElementById("amount").value;
    
    if (amount === "" || amount <= 0) {
        alert("Please enter a valid amount");
        return;
    }

    amount = Number(amount);
    let discountPercent = 0;

    // Logic based on your original tiers
    if (amount >= 10000) {
        discountPercent = 50;
    } else if (amount >= 5000) {
        discountPercent = 25;
    } else if (amount >= 3000) {
        discountPercent = 10;
    }

    let discountAmount = (amount * discountPercent) / 100;
    let finalPrice = amount - discountAmount;

    // Show table and update values
    document.getElementById("resultTable").style.display = "table";
    document.getElementById("tdPrice").innerText = "$" + amount.toFixed(2);
    document.getElementById("tdDisc").innerText = discountPercent + "%";
    document.getElementById("tdFinal").innerText = "$" + finalPrice.toFixed(2);
}
</script>

</body>
</html>
