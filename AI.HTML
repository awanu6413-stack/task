<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise UI Lab | Live Editor v4.0</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

<style>
:root {
--primary-accent: #0d6efd;
--sidebar-w: 280px;
--body-bg: #f4f7fa;
--card-bg: #ffffff;
--text-col: #1a1d23;
--border-color: rgba(0,0,0,0.08);
}

[data-theme="dark"] {
--body-bg: #0f1115;
--card-bg: #1a1d23;
--text-col: #e9ecef;
--border-color: rgba(255,255,255,0.1);
}

body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--body-bg); color: var(--text-col); transition: 0.3s; overflow-x: hidden; }

/* Sidebar Styling */
.sidebar {
width: var(--sidebar-w); height: 100vh; position: fixed;
background: var(--card-bg); border-right: 1px solid var(--border-color);
z-index: 1050; transition: transform 0.3s ease;
}

@media (max-width: 991px) {
.sidebar { transform: translateX(-100%); }
.sidebar.active { transform: translateX(0); }
.main { margin-left: 0 !important; }
}

.main { margin-left: var(--sidebar-w); padding: 2rem; transition: 0.3s; }

/* Mobile Toggle */
.mobile-toggle { display: none; position: fixed; top: 15px; right: 15px; z-index: 1100; }
@media (max-width: 991px) { .mobile-toggle { display: block; } }

/* Glass Card & Editor */
.glass-card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
.preview-box { padding: 100px 20px; display: flex; justify-content: center; position: relative; background-image: radial-gradient(var(--border-color) 1px, transparent 1px); background-size: 20px 20px; }

.code-container { position: relative; background: #2d2d2d; }
#codeArea {
outline: none; padding: 20px; min-height: 100px; max-height: 400px;
overflow: auto; display: block; white-space: pre-wrap; color: #fff;
}

.btn-star { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #ccc; border: none; background: transparent; z-index: 5; }
.btn-star.active { color: #ffc107; }

.color-tool { position: absolute; bottom: 20px; left: 20px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 50px; color: white; font-size: 11px; }

.nav-link { color: var(--text-col); opacity: 0.7; padding: 12px 15px; border-radius: 12px; margin: 4px 15px; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
.nav-link.active { opacity: 1; background: var(--primary-accent); color: white !important; }

.editor-label { position: absolute; top: -10px; left: 20px; background: #0d6efd; color: white; padding: 2px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
</style>
</head>
<body>

<button class="btn btn-primary mobile-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>

<div class="sidebar d-flex flex-column" id="sidebar">
<div class="p-4">
<div class="d-flex justify-content-between align-items-center mb-4">
<h5 class="fw-bold m-0 text-primary">UI Framework</h5>
<button class="btn btn-light btn-sm" onclick="toggleTheme()"><i class="bi bi-moon-stars"></i></button>
</div>
<input type="text" id="compSearch" class="form-control form-control-sm border-0 bg-light" placeholder="Search..." onkeyup="filterSidebar()">
</div>
<div class="flex-grow-1 overflow-auto" id="menuItems"></div>
</div>

<div class="main">
<div class="d-flex justify-content-between align-items-end mb-4">
<div>
<h2 class="fw-bold m-0" id="c-name">Loading...</h2>
<p class="text-muted small" id="c-info">Live Editor Enabled</p>
</div>
<div class="d-flex gap-2">
<button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="filterCategory('all', this)">All</button>
<button class="btn btn-sm btn-outline-warning rounded-pill" onclick="filterCategory('fav', this)">Saved</button>
</div>
</div>

<div class="glass-card">
<button class="btn-star" id="starBtn" onclick="toggleFavorite()"><i class="bi bi-star-fill"></i></button>

<div class="color-tool">
<i class="bi bi-palette"></i>
<input type="color" id="bgPicker" value="#ffffff" oninput="changeBg(this.value)" style="border:none; width:20px; height:20px; background:none;">
</div>

<div class="preview-box border-bottom" id="livePreview"></div>

<div class="code-container">
<div class="editor-label">LIVE HTML EDITOR</div>
<div class="p-2 d-flex justify-content-end bg-dark border-bottom border-secondary">
<button class="btn btn-link btn-sm text-info text-decoration-none me-3" onclick="resetCode()"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
<button class="btn btn-primary btn-sm px-4" onclick="copyCode()">Copy</button>
</div>
<pre><code contenteditable="true" id="codeArea" class="language-html" oninput="syncPreview()"></code></pre>
</div>
</div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
<div id="liveToast" class="toast align-items-center text-white bg-dark border-0" role="alert">
<div class="d-flex"><div class="toast-body" id="toastMsg"></div></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script >
const components = [
{ id: 'b1', cat: 'button', name: 'Glow Button', html: '<button class="btn btn-primary shadow-lg" style="padding: 15px 35px; border-radius: 50px;">Glow Button</button>' },
{ id: 'b2', cat: 'button', name: 'Gradient Pulse', html: '<button class="btn border-0 text-white" style="background: linear-gradient(45deg, #f093fb, #f5576c); padding: 12px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);">Pulse</button>' },
{ id: 'c1', cat: 'card', name: 'Info Card', html: '<div class="card p-4 border-0 shadow-sm" style="width: 250px; border-radius: 20px;">\n <h5 class="fw-bold">Card Title</h5>\n <p class="text-muted small">Edit this text in the editor below!</p>\n</div>' },
{ id: 'f1', cat: 'form', name: 'Search Bar', html: '<div class="input-group" style="max-width: 400px;">\n <input type="text" class="form-control border-0 shadow-sm" placeholder="Search items...">\n <button class="btn btn-primary">Find</button>\n</div>' }
];

let activeId = 'b1';
let favorites = JSON.parse(localStorage.getItem('ui_favorites')) || [];

window.onload = () => {
buildMenu('all');
renderComponent('b1');
};

function toggleSidebar() {
document.getElementById('sidebar').classList.toggle('active');
}

function buildMenu(category) {
const list = document.getElementById('menuItems');
list.innerHTML = '';
components.forEach(c => {
const isFav = favorites.includes(c.id);
if (category === 'all' || (category === 'fav' && isFav)) {
const a = document.createElement('div');
a.className = `nav-link ${c.id === activeId ? 'active' : ''}`;
a.innerHTML = `<i class="bi bi-cpu me-2"></i> ${c.name} ${isFav ? '<i class="bi bi-star-fill text-warning ms-auto"></i>' : ''}`;
a.onclick = () => { renderComponent(c.id); if(window.innerWidth < 992) toggleSidebar(); };
list.appendChild(a);
}
});
}

function renderComponent(id) {
activeId = id;
const item = components.find(c => c.id === id);
document.getElementById('c-name').innerText = item.name;

// Set Code in Editor
const codeArea = document.getElementById('codeArea');
codeArea.textContent = item.html;

// Sync Preview
syncPreview();

// UI Updates
document.getElementById('starBtn').classList.toggle('active', favorites.includes(id));
buildMenu(document.querySelector('.btn-outline-secondary.active') ? 'all' : 'all');
}

// LIVE PREVIEW SYNC
function syncPreview() {
const code = document.getElementById('codeArea').innerText;
document.getElementById('livePreview').innerHTML = code;
}

function resetCode() {
const original = components.find(c => c.id === activeId).html;
document.getElementById('codeArea').textContent = original;
syncPreview();
showToast("Code Reset to Original");
}

function changeBg(color) {
document.getElementById('livePreview').style.backgroundColor = color;
}

function toggleFavorite() {
if (favorites.includes(activeId)) {
favorites = favorites.filter(id => id !== activeId);
showToast("Removed from Saved");
} else {
favorites.push(activeId);
showToast("Saved to Favorites");
}
localStorage.setItem('ui_favorites', JSON.stringify(favorites));
renderComponent(activeId);
}

function copyCode() {
const text = document.getElementById('codeArea').innerText;
navigator.clipboard.writeText(text);
showToast("Copied to Clipboard!");
}

function filterSidebar() {
const q = document.getElementById('compSearch').value.toLowerCase();
document.querySelectorAll('.nav-link').forEach(l => {
l.style.display = l.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
});
}

function toggleTheme() {
const root = document.documentElement;
root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function showToast(msg) {
document.getElementById('toastMsg').innerText = msg;
new bootstrap.Toast(document.getElementById('liveToast')).show();
}

function filterCategory(cat, el) {
document.querySelectorAll('.btn-sm').forEach(b => b.classList.remove('active'));
el.classList.add('active');
buildMenu(cat);
}

</script>
</body>
</html>
